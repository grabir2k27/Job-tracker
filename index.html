<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job solution</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navber-container">
        <h2>Job Application Tracker</h2>
        <div class="fast-row">
            <div class="fast-card">
                <span class="label-fast">Total</span>
                <span class="total" id="total-count">8</span>
            </div>
            <div class="interview-card">
                <span class="label">Interview</span>
                <span class="Interview" id="Interview-count">0</span>
            </div>
            <div class="interview-card">
                <span class="label">Rejected</span>
                <span class="Rejected" id="Rejected-count">0</span>
            </div>

        </div>
    </div>

    <div class="header">
        <div class="header-row">
            <h3>Available Jobs</h3>
            <span class="job-count">8 Jobs</span>
        </div>

        <div class="button-all">
            <button class="header-btn active" data-btn="all">All</button>
            <button class="header-btn" data-btn="interview">Interview</button>
            <button class="header-btn" data-btn="Rejected">Rejected</button>
        </div>
    </div>


    <div class="job-card">
        <div class="card-header">
        <h4>Mobile First Corp</h4>
        <p class="job-title">React Native Develope</p>
    </div>
    <button class="delete-btn" aria-label ="delete">🗑️

</button>

        <div class="job-meta">
            <span>Remote</span> . <span>Full-time</span> . <span>$130,000 - $175,000</span>
        </div>
        <div class="statrus-badge not-applied">NOT APPLIED</div>
        <p class="description">Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.
        </p>

        <div class="card-actions">
            <button class="action-btn interview">INTERVIEW</button>
            <button class="action-btn rejected">REJECTED</button>
        </div>
        </div>

    <script src="script.js"></script>
</body>
</html>
